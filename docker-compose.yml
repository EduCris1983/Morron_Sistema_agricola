version: '3.9'

services:
  # PostgreSQL 16 + pgvector
  postgres:
    image: pgvector/pgvector:pg16-latest
    container_name: morron_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-morron_erp}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - morron_net

  # Backend FastAPI
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: morron_api
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-morron_erp}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - morron_net

  # Frontend Nginx (development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: morron_frontend
    ports:
      - "${FRONTEND_PORT:-5175}:5175"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://api:8000
      VITE_PORT: 5175
    depends_on:
      - api
    networks:
      - morron_net

volumes:
  postgres_data:
    driver: local

networks:
  morron_net:
    driver: bridge
